<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Alfred</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a24;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --glow-primary: rgba(99, 102, 241, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            background: 
                radial-gradient(circle at 20% 20%, var(--glow-primary) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.2) 0%, transparent 50%),
                var(--bg-dark);
            padding: 2rem;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent-primary); }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header h1 span { font-size: 1.5rem; }

        .sync-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--accent-success);
        }

        /* Calendar Grid */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .nav-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-btn:hover { background: var(--bg-card-hover); border-color: var(--accent-primary); }

        .current-month { font-size: 1.25rem; font-weight: 600; }

        .add-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--glow-primary); }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border-color);
            border-radius: 16px;
            overflow: hidden;
        }

        .day-header {
            background: var(--bg-card);
            padding: 1rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .day {
            background: var(--bg-card);
            min-height: 120px;
            padding: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .day:hover { background: var(--bg-card-hover); }
        .day.other-month { opacity: 0.4; }
        .day.today { background: rgba(99, 102, 241, 0.1); }
        .day.today .day-number {
            background: var(--accent-primary);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .day-number {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .event-pill {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-card);
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 { font-size: 1.25rem; }
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.8;
        }
        .modal-close:hover { opacity: 1; }

        .modal-body { padding: 1.5rem; }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.875rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .color-options {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .color-option:hover { transform: scale(1.1); }
        .color-option.selected { border-color: white; }

        .emails-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .email-tag {
            background: rgba(99, 102, 241, 0.2);
            padding: 0.375rem 0.75rem;
            border-radius: 100px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .email-tag button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
        }
        .email-tag button:hover { color: var(--accent-danger); }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-secondary {
            background: var(--bg-card-hover);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        /* Event List */
        .events-list {
            margin-top: 2rem;
        }
        .events-list h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .event-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .event-card:hover { border-color: var(--accent-primary); }

        .event-color {
            width: 4px;
            height: 40px;
            border-radius: 2px;
        }

        .event-info { flex: 1; }
        .event-info h4 { font-size: 0.95rem; margin-bottom: 0.25rem; }
        .event-info p { font-size: 0.8rem; color: var(--text-muted); }

        .event-actions {
            display: flex;
            gap: 0.5rem;
        }
        .event-actions button {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .event-actions button:hover { background: var(--bg-card-hover); }
        .event-actions button.danger:hover { border-color: var(--accent-danger); color: var(--accent-danger); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-card);
            border: 1px solid var(--accent-success);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: var(--accent-danger); }

        /* Loading */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .calendar-grid { grid-template-columns: 1fr; }
            .day { min-height: 60px; }
            .day-header { display: none; }
            .day::before {
                content: attr(data-day);
                font-weight: 600;
                margin-right: 0.5rem;
            }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Torna alla Dashboard</a>
        
        <div class="header">
            <h1><span>📅</span> Calendario</h1>
            <div class="sync-badge" id="syncBadge">
                <span>●</span> <span id="syncStatus">Caricamento...</span>
            </div>
        </div>

        <div class="calendar-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">← Precedente</button>
            <span class="current-month" id="currentMonth">Aprile 2026</span>
            <button class="nav-btn" onclick="changeMonth(1)">Successivo →</button>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <div class="loading">Caricamento...</div>
        </div>

        <div class="events-list">
            <h3>Prossimi Eventi</h3>
            <div id="eventsList"></div>
        </div>
    </div>

    <!-- Modal Nuovo Evento -->
    <div class="modal-overlay" id="eventModal">
        <div class="modal">
            <div class="modal-header">
                <h2>✏️ Nuovo Evento</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Titolo *</label>
                    <input type="text" id="eventTitle" placeholder="Nome dell'evento">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Data Inizio *</label>
                        <input type="date" id="eventStartDate">
                    </div>
                    <div class="form-group">
                        <label>Orario Inizio *</label>
                        <input type="time" id="eventStartTime" value="09:00">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Data Fine</label>
                        <input type="date" id="eventEndDate">
                    </div>
                    <div class="form-group">
                        <label>Orario Fine</label>
                        <input type="time" id="eventEndTime" value="10:00">
                    </div>
                </div>

                <div class="form-group">
                    <label>Luogo</label>
                    <input type="text" id="eventLocation" placeholder="Indirizzo o meeting link">
                </div>

                <div class="form-group">
                    <label>Descrizione</label>
                    <textarea id="eventDescription" placeholder="Note aggiuntive..."></textarea>
                </div>

                <div class="form-group">
                    <label>Colore</label>
                    <div class="color-options" id="colorOptions"></div>
                </div>

                <div class="form-group">
                    <label>Email per promemoria (invio notifica)</label>
                    <input type="email" id="eventEmail" placeholder="tua@email.com">
                    <div class="emails-list" id="emailsList"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Annulla</button>
                <button class="btn btn-primary" onclick="saveEvent()">💾 Salva Evento</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <span id="toastMessage">Operazione completata!</span>
    </div>

    <script>
        const COLORS = [
            { id: 1, hex: '#a4bdfc' },
            { id: 2, hex: '#7ae7bf' },
            { id: 3, hex: '#dbadff' },
            { id: 4, hex: '#ff887c' },
            { id: 5, hex: '#fbd75b' },
            { id: 6, hex: '#ffb878' },
            { id: 7, hex: '#46d6db' },
            { id: 8, hex: '#e1e1e1' },
            { id: 9, hex: '#5484ed' },
            { id: 10, hex: '#51b749' },
            { id: 11, hex: '#dc2127' }
        ];

        let currentDate = new Date();
        let events = [];
        let selectedColor = 7;
        let selectedEmails = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initColorOptions();
            checkStatus();
            loadEvents();
            renderCalendar();
            
            // Set default dates
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            document.getElementById('eventStartDate').value = todayStr;
            document.getElementById('eventEndDate').value = todayStr;
        });

        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const badge = document.getElementById('syncStatus');
                if (data.googleConnected) {
                    badge.textContent = 'Sincronizzato con Google';
                    document.getElementById('syncBadge').style.color = 'var(--accent-success)';
                } else {
                    badge.textContent = 'Modalità locale';
                    document.getElementById('syncBadge').style.color = 'var(--accent-warning)';
                }
            } catch (err) {
                document.getElementById('syncStatus').textContent = 'Errore connessione';
            }
        }

        function initColorOptions() {
            const container = document.getElementById('colorOptions');
            container.innerHTML = COLORS.map(c => `
                <div class="color-option ${c.id === selectedColor ? 'selected' : ''}" 
                     style="background: ${c.hex}"
                     data-id="${c.id}"
                     onclick="selectColor(${c.id})"></div>
            `).join('');
        }

        function selectColor(id) {
            selectedColor = id;
            document.querySelectorAll('.color-option').forEach(el => {
                el.classList.toggle('selected', parseInt(el.dataset.id) === id);
            });
        }

        async function loadEvents() {
            try {
                const from = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1).toISOString();
                const to = new Date(currentDate.getFullYear(), currentDate.getMonth() + 2, 0).toISOString();
                
                const res = await fetch(`/api/events?from=${from}&to=${to}`);
                events = await res.json();
                
                if (!Array.isArray(events)) events = [];
                
                renderCalendar();
                renderEventsList();
            } catch (err) {
                console.error('Error loading events:', err);
                showToast('Errore nel caricamento eventi', true);
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('currentMonth').textContent = 
                new Date(year, month).toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            const today = new Date();
            
            let html = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab']
                .map(d => `<div class="day-header">${d}</div>`).join('');

            // Previous month days
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += `<div class="day other-month" data-day="${day}"></div>`;
            }

            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEvents = events.filter(e => {
                    const start = e.start?.dateTime || e.start?.date;
                    return start && start.startsWith(dateStr);
                });

                const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
                
                html += `<div class="day ${isToday ? 'today' : ''}" data-day="${day}" onclick="openModal('${dateStr}')">
                    <div class="day-number">${day}</div>
                    ${dayEvents.slice(0, 3).map(e => `
                        <div class="event-pill" style="background: ${getEventColor(e)}" 
                             onclick="event.stopPropagation(); showEventDetails('${e.id}')">
                            ${e.summary || 'Senza titolo'}
                        </div>
                    `).join('')}
                    ${dayEvents.length > 3 ? `<div style="font-size: 0.7rem; color: var(--text-muted)">+${dayEvents.length - 3} altro</div>` : ''}
                </div>`;
            }

            // Next month days
            const totalCells = firstDay + daysInMonth;
            const remaining = totalCells > 35 ? 42 - totalCells : 35 - totalCells;
            for (let i = 1; i <= remaining; i++) {
                html += `<div class="day other-month" data-day="${i}"></div>`;
            }

            grid.innerHTML = html;
        }

        function getEventColor(event) {
            if (event.colorId) {
                const color = COLORS.find(c => c.id === parseInt(event.colorId));
                return color ? color.hex : COLORS[6].hex;
            }
            return COLORS[6].hex;
        }

        function renderEventsList() {
            const container = document.getElementById('eventsList');
            const upcoming = events
                .filter(e => new Date(e.start?.dateTime || e.start?.date) >= new Date())
                .sort((a, b) => new Date(a.start?.dateTime || a.start?.date) - new Date(b.start?.dateTime || b.start?.date))
                .slice(0, 5);

            if (upcoming.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">Nessun evento in programma</p>';
                return;
            }

            container.innerHTML = upcoming.map(e => {
                const start = new Date(e.start?.dateTime || e.start?.date);
                const dateStr = start.toLocaleDateString('it-IT', { weekday: 'short', day: 'numeric', month: 'short' });
                const timeStr = e.start?.dateTime ? start.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }) : 'Giorno intero';

                return `
                    <div class="event-card">
                        <div class="event-color" style="background: ${getEventColor(e)}"></div>
                        <div class="event-info">
                            <h4>${e.summary || 'Senza titolo'}</h4>
                            <p>${dateStr} • ${timeStr}</p>
                        </div>
                        <div class="event-actions">
                            <button onclick="sendReminder('${e.id}')" title="Invia promemoria">📧</button>
                            <button class="danger" onclick="deleteEvent('${e.id}')" title="Elimina">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            loadEvents();
        }

        function openModal(dateStr) {
            document.getElementById('eventStartDate').value = dateStr;
            document.getElementById('eventEndDate').value = dateStr;
            document.getElementById('eventModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.remove('active');
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventLocation').value = '';
            document.getElementById('eventDescription').value = '';
            document.getElementById('eventEmail').value = '';
            selectedEmails = [];
            renderEmailsList();
        }

        function renderEmailsList() {
            const container = document.getElementById('emailsList');
            container.innerHTML = selectedEmails.map(email => `
                <div class="email-tag">
                    ${email}
                    <button onclick="removeEmail('${email}')">×</button>
                </div>
            `).join('');
        }

        function addEmail() {
            const input = document.getElementById('eventEmail');
            const email = input.value.trim();
            if (email && !selectedEmails.includes(email)) {
                selectedEmails.push(email);
                input.value = '';
                renderEmailsList();
            }
        }

        document.getElementById('eventEmail').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addEmail();
            }
        });

        function removeEmail(email) {
            selectedEmails = selectedEmails.filter(e => e !== email);
            renderEmailsList();
        }

        async function saveEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const startDate = document.getElementById('eventStartDate').value;
            const startTime = document.getElementById('eventStartTime').value;
            const endDate = document.getElementById('eventEndDate').value || startDate;
            const endTime = document.getElementById('eventEndTime').value;
            const location = document.getElementById('eventLocation').value.trim();
            const description = document.getElementById('eventDescription').value.trim();

            if (!title || !startDate || !startTime) {
                showToast('Compila i campi obbligatori (titolo, data, orario)', true);
                return;
            }

            // Format ISO 8601 for Google Calendar
            const start = new Date(`${startDate}T${startTime}:00`).toISOString();
            const end = new Date(`${endDate}T${endTime}:00`).toISOString();

            try {
                const res = await fetch('/api/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title,
                        start,
                        end,
                        location,
                        description,
                        color: selectedColor,
                        emails: selectedEmails
                    })
                });

                const result = await res.json();
                if (!res.ok) throw new Error(result.error || 'Failed to save');

                showToast('Evento salvato!');
                closeModal();
                loadEvents();
            } catch (err) {
                showToast('Errore: ' + err.message, true);
            }
        }

        async function deleteEvent(id) {
            if (!confirm('Eliminare questo evento?')) return;

            try {
                await fetch(`/api/events/${id}`, { method: 'DELETE' });
                showToast('Evento eliminato');
                loadEvents();
            } catch (err) {
                showToast('Errore nell\'eliminazione', true);
            }
        }

        async function sendReminder(id) {
            const event = events.find(e => e.id === id);
            if (!event) return;

            const email = prompt('Inserisci email per il promemoria:');
            if (!email) return;

            const start = new Date(event.start?.dateTime || event.start?.date);
            const dateStr = start.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            const timeStr = event.start?.dateTime ? start.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }) : 'Giorno intero';

            try {
                await fetch('/api/send-reminder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        to: email,
                        eventTitle: event.summary || 'Evento',
                        eventDate: dateStr,
                        eventTime: timeStr,
                        location: event.location || '',
                        description: event.description || ''
                    })
                });
                showToast('Promemoria inviato!');
            } catch (err) {
                showToast('Errore nell\'invio', true);
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.toggle('error', isError);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
